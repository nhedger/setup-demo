name: Integrate

on:
  workflow_call:

jobs:
  bundle:
    name: Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Bundle action
        run: bun run build
      - name: Upload bundled action
        uses: actions/upload-artifact@v7
        with:
          name: bundled-action
          path: |
            dist/**
            action.yaml
  integrate:
    name: Integrate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-26
          - macos-26-intel
          - windows-2025
          - windows-11-arm
    steps:
      - name: Download bundled action
        uses: actions/download-artifact@v8
        with:
          name: bundled-action
      - name: Test action
        uses: ./
      