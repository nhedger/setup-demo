name: Test

on:
  workflow_call:

jobs:
  bundle:
    name: Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Bundle action
        run: bun run build
      - name: Upload bundled action
        uses: actions/upload-artifact@v7
        with:
          name: bundled-action
          path: |
            dist/**
            action.yaml
  test:
    name: Test (${{ matrix.label }})
    needs: bundle
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            label: 'Ubuntu 24.04 x64'
          - os: ubuntu-24.04-arm
            label: 'Ubuntu 24.04 arm64'
          - os: macos-26-intel
            label: 'macOS 26 x64'
          - os: macos-26
            label: 'macOS 26 arm64'
          - os: windows-2025
            label: 'Windows 2025 x64'
          - os: windows-11-arm
            label: 'Windows 11 arm64'

    steps:
      - name: Download bundled action
        uses: actions/download-artifact@v8
        with:
          name: bundled-action
      - name: Test action
        uses: ./
      