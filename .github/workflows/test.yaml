name: Test

on:
  workflow_call:

jobs:
  bundle:
    name: Create test bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install dependencies
        run: bun install
      - name: Bundle action
        run: bun run build
      - name: Upload bundled action
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundled-action
          path: |
            dist/**
            action.yaml
  test:
    name: Test (${{ matrix.label }})
    needs: bundle
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            label: 'Ubuntu 24.04 x64'
          - os: ubuntu-24.04-arm
            label: 'Ubuntu 24.04 arm64'
          - os: macos-26-intel
            label: 'macOS 26 x64'
          - os: macos-26
            label: 'macOS 26 arm64'
          - os: windows-2025
            label: 'Windows x64'
          - os: windows-11-arm
            label: 'Windows arm64'

    steps:
      - name: Download bundled action
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bundled-action
      - name: Test action
        uses: ./
      