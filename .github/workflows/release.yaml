name: Release

on:
  workflow_dispatch:

jobs:
  test:
    name: Pre-release tests
    uses: ./.github/workflows/test.yaml
  changelog:
    name: Generate changelog
    needs: test
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Consume changesets
        run: bun changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract updated version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(release): prepare release v${{ steps.version.outputs.version }}"
          git push
      - name: Save commit SHA for release
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
  release:
    name: Release ${{ inputs.version }}
    needs: [changelog]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.changelog.outputs.sha }}
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Bundle action
        run: bun run build
      - name: Set git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create release commit
        run: |
          git add -f dist
          git commit -m "chore: release"
      - name: Create version tags
        run: |
          VERSION="v${{ needs.changelog.outputs.version }}"
          MINOR="${VERSION%.*}"
          MAJOR="${VERSION%%.*}"
          RELEASE_COMMIT=$(git rev-parse HEAD)
          git tag -af "$VERSION" "$RELEASE_COMMIT" -m "Release $VERSION"
          git tag -af "$MINOR" "$RELEASE_COMMIT" -m "$MINOR -> $VERSION"
          git tag -af "$MAJOR" "$RELEASE_COMMIT" -m "$MAJOR -> $VERSION"
          git push origin "$VERSION" "$MINOR" "$MAJOR" --force
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.changelog.outputs.version }}
          make_latest: true
          body: |
            See the changelog for details:

            https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md#${{ needs.changelog.outputs.version }}