name: Release

on:
  workflow_dispatch:

jobs:
  test:
    name: Pre-release tests
    uses: ./.github/workflows/test.yaml

  changelog:
    name: Generate changelog
    needs: test
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
      pull-requests: read

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0
      - name: Set up git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.13.0
      - name: Compute new version
        id: version
        run: |
          VERSION=$(git cliff --config .github/changelog.cliff.toml --bumped-version | tr -d 'v')
          if [ -z "$VERSION" ]; then
            echo "::error::git-cliff could not determine the next version."
            exit 1
          fi
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate full changelog
        run: |
          git cliff \
            --config .github/changelog.cliff.toml \
            --tag "${{ steps.version.outputs.tag }}" \
            --output CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate release notes
        id: release-notes
        run: |
          git cliff \
            --config .github/release-notes.cliff.toml \
            --unreleased \
            --tag "${{ steps.version.outputs.tag }}" \
            --strip all \
            --output RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload changelog artifacts
        uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: |
            CHANGELOG.md
            RELEASE_NOTES.md

  release:
    name: Release
    needs: [changelog]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Update package version
        run: bun pm pkg set version=${{ needs.changelog.outputs.version }}
      - name: Install dependencies
        run: bun install
      - name: Bundle action
        run: bun run build
      - name: Download changelog artifacts
        uses: actions/download-artifact@v8
        with:
          name: changelog
      - name: Set git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create release commit
        run: |
          git add -f dist CHANGELOG.md package.json
          git commit -m "chore(release): ${{ needs.changelog.outputs.tag }}"
          git push origin main
      - name: Create version tags
        run: |
          PATCH="${{ needs.changelog.outputs.tag }}"
          MINOR="${PATCH%.*}"
          MAJOR="${PATCH%%.*}"
          git tag -af "$PATCH" -m "Release $PATCH"
          git tag -af "$MINOR" -m "$MINOR -> $PATCH"
          git tag -af "$MAJOR" -m "$MAJOR -> $PATCH"
          git push --force origin "$PATCH" "$MINOR" "$MAJOR" 
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.changelog.outputs.tag }}
          make_latest: true
          body_path: RELEASE_NOTES.md
